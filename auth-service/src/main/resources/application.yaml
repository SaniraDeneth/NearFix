spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5434/auth_db
    username: postgres
    password: "password"
    driver-class-name: org.postgresql.Driver
  jwt:
    secret: ${JWT_SECRET}
    accessTokenExpiration: 3600
    refreshTokenExpiration: 604800
server:
  port: 8082
services:
  internal-secret: ${INTERNAL_SERVICES_SECRET:dev_internal_secret_key_123!}