services:

  postgres-gig:
    image: postgis/postgis:15-3.4
    container_name: gig-db
    environment:
      POSTGRES_DB: gig_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - gig_db_data:/var/lib/postgresql/data

  postgres-auth:
    image: postgis/postgis:15-3.4
    container_name: auth-db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - auth_db_data:/var/lib/postgresql/data

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-auth:5432/auth_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
      - JWT_SECRET=your_secret_key_here_at_least_32_characters_long
    depends_on:
      - postgres-auth

  gig-service:
    build:
      context: ./gig-service
      dockerfile: Dockerfile
    container_name: gig-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-gig:5432/gig_db
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=password
    depends_on:
      - postgres-gig

  redis:
    image: redis:7-alpine
    container_name: gateway-redis
    ports:
      - "6379:6379"

volumes:
  gig_db_data:
  auth_db_data:
  redis_data: