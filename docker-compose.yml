services:

  postgres-gig:
    image: postgis/postgis:15-3.4
    container_name: gig-db
    environment:
      POSTGRES_DB: gig_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - gig_db_data:/var/lib/postgresql/data

volumes:
  gig_db_data: